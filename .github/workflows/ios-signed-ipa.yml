name: iOS Signed IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      export_method:
        description: Export method
        required: true
        default: ad-hoc
        type: choice
        options:
          - ad-hoc
          - development
          - app-store
  push:
    branches: [main]
    paths:
      - "AICompositionCamera/**"
      - "AICompositionCamera.xcodeproj/**"
      - ".github/workflows/ios-signed-ipa.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build Signed IPA
    runs-on: macos-14
    env:
      BUILD_CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
      PROJECT_PATH: AICompositionCamera.xcodeproj
      SCHEME: AICompositionCamera
      ARCHIVE_PATH: build/AICompositionCamera.xcarchive
      EXPORT_PATH: build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Show Xcode Project Info
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Install Signing Assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail

          if [ -z "$IOS_CERTIFICATE_P12_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISION_PROFILE_BASE64" ]; then
            echo "Missing signing secrets. Set IOS_CERTIFICATE_P12_BASE64, IOS_CERTIFICATE_PASSWORD, and IOS_PROVISION_PROFILE_BASE64."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/signing_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print TeamIdentifier:0' "$PROFILE_PLIST")
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$PROFILE_PLIST")
          BUNDLE_ID=${APP_IDENTIFIER#${TEAM_ID}.}

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(.*\)".*/\1/p' | head -n 1)
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "No code signing identity found in imported certificate. Make sure the .p12 contains the private key."
            exit 1
          fi

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "TEAM_ID=$TEAM_ID"
            echo "BUNDLE_ID=$BUNDLE_ID"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "SIGNING_IDENTITY=$SIGNING_IDENTITY"
          } >> "$GITHUB_ENV"

          echo "Using signing identity: $SIGNING_IDENTITY"

      - name: Archive Signed Device App
        run: |
          set -o pipefail
          set +e
          rm -rf build ExportOptions.plist xcodebuild.log

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$BUILD_CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            clean archive 2>&1 | tee xcodebuild.log

          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## xcodebuild archive failed"
              echo
              echo "### Errors"
              echo '```text'
              grep -n -E "error:|Undefined symbols|ld:|clang: error|SwiftCompile|CodeSign|Provisioning profile|Signing" xcodebuild.log || true
              echo '```'
              echo
              echo "### Last log lines"
              echo '```text'
              tail -n 120 xcodebuild.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi

      - name: Export Signed IPA
        run: |
          set -o pipefail
          mkdir -p "$EXPORT_PATH"

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>compileBitcode</key>
            <false/>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tee -a xcodebuild.log

      - name: Package IPA Artifacts
        run: |
          set -euo pipefail
          IPA_PATH=$(find "$EXPORT_PATH" -name '*.ipa' -print -quit)

          if [ -z "$IPA_PATH" ]; then
            echo "No .ipa file found in $EXPORT_PATH"
            exit 1
          fi

          cp "$IPA_PATH" AICompositionCamera-signed-device.ipa

      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: AICompositionCamera-signed-ipa
          retention-days: 14
          path: AICompositionCamera-signed-device.ipa

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ios-signed-${{ github.run_number }}
        run: |
          gh release create "$RELEASE_TAG" \
            AICompositionCamera-signed-device.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "AICompositionCamera iOS signed build #${GITHUB_RUN_NUMBER}" \
            --notes "Signed iOS $EXPORT_METHOD IPA for commit ${GITHUB_SHA}. Directly download AICompositionCamera-signed-device.ipa. Install only on devices allowed by the provisioning profile."

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AICompositionCamera-ios-build-log
          retention-days: 14
          path: xcodebuild.log

      - name: Build Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Signed iOS IPA

          Artifact: \`AICompositionCamera-signed-ipa\`

          Export method: \`$EXPORT_METHOD\`

          Bundle ID from profile: \`$BUNDLE_ID\`

          Files:
          - \`AICompositionCamera-signed-device.ipa\`

          The IPA can only be installed according to the provisioning profile type and device list.
          EOF
